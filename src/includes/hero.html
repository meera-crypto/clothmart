<section class="hero" aria-labelledby="hero-title">
  <div class="container">
    <div class="hero__layout">
      <div class="hero__content">
        <div class="hero__card">
          <p class="hero__eyebrow">SUMMER SALE 50% OFF</p>
          <h1 id="hero-title">Design For Beauty</h1>
          <p class="hero__description">
            You Can Have Anything You Want In Life You Dress For It.
          </p>
          <button class="btn btn-primary hero-button" type="button">
            All collection
          </button>
        </div>
      </div>
      <div class="hero__media">
        <picture>
          <source
            srcset="/uploads/hero-image.webp 1x, /uploads/hero-image_2x.webp 2x"
            type="image/webp"
          />
          <source
            srcset="/uploads/hero-image.jpg 1x, /uploads/hero-image_2x.jpg 2x"
            type="image/jpeg"
          />
          <img
            class="hero__image"
            src="/uploads/hero-image.jpg"
            alt="Model wearing Clothmart summer collection"
            loading="lazy"
          />
        </picture>
      </div>
    </div>
  </div>
</section>
