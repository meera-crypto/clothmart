<header class="header sticky-top">
  <div class="container">
    <div class="header-top">
      <img src="/uploads/logo.svg" alt="Clothmart" width="103" height="19" />
      <div class="header-top-end">
        <div class="search-filter" id="site-search-panel">
          <div class="filter-dropdown">
            <select aria-label="Product category" id="filter-header-category">
              <option>All</option>
              <option>Dress</option>
              <option>Accessories</option>
              <option>Miscellaneous</option>
            </select>
            <span class="icon-arrowdown" aria-hidden="true"></span>
          </div>
          <div class="search-box">
            <form role="search" aria-label="Site search">
              <input
                id="search-input"
                type="search"
                placeholder="Search..."
                aria-label="Search products"
                maxlength="100"
              />
              <span class="icon-search" aria-hidden="true"></span>
            </form>
          </div>
        </div>
        <div class="mobile-header-actions">
          <button
            class="mobile-header-action mobile-search-toggle"
            type="button"
            aria-label="Search"
            aria-expanded="false"
            aria-controls="site-search-panel"
          >
            <span class="icon-search" aria-hidden="true"></span>
          </button>
          <a class="mobile-header-action" href="#" aria-label="Cart">
            <span class="icon-cart" aria-hidden="true"></span>
          </a>
        </div>
      </div>
    </div>
  </div>
  <partial src="nav.html"> </partial>
</header>
